<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KPI Veiculos - Tractorbel Rental</title>
    <link rel="stylesheet" href="index.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="menu-toggle" onclick="toggleMenu()">Menu</div>
        <ul id="menu">
            <li><a href="index.html">INICIO</a></li>
            <li><a href="documentos.html">DOCUMENTACAO</a></li>
            <li><a href="indicadores.html">KPI TEC.</a></li>
            <li><a href="indicadores-resultado.html">KPI FINAN.</a></li>
            <li><a href="veiculos.html">KPI VEICULOS</a></li>
        </ul>
    </nav>

    <div class="container">
        <header>
            <div class="center">
                <img src="png/logo.png" alt="Logo Tractorbel">
            </div>
            <h1>KPI Veiculos</h1>
        </header>

        <main class="veiculos-page">
            <section class="veiculos-card">
                <p class="veiculos-lead">
                    Grafico gerado a partir da planilha <strong>Placas.xlsx</strong>, aba
                    <strong>DimPlacas</strong>, com leitura das colunas A e H no Google Drive.
                </p>

                <figure class="veiculos-chart">
                    <canvas id="graficoVeiculos"></canvas>
                    <figcaption>Gráfico dinâmico carregado da planilha.</figcaption>
                </figure>

            </section>
        </main>
    </div>

<script>

function toggleMenu() {
    document.getElementById("menu").classList.toggle("active");
}

// ID da sua planilha
const fileId = "1XopZiZbSuJ7tLB5JkrnEk83UiYKSsNbt";

// link download
const url = `https://drive.google.com/uc?export=download&id=${fileId}`;

fetch(url)
.then(res => res.arrayBuffer())
.then(data => {

    const workbook = XLSX.read(data, { type: "array" });

    const sheet = workbook.Sheets["DimPlacas"];

    const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });

    const placas = [];
    const valores = [];

    for (let i = 1; i < rows.length; i++) {

        const placa = rows[i][0]; // coluna A
        const valor = rows[i][7]; // coluna H

        if (placa && valor) {
            placas.push(placa);
            valores.push(Number(valor));
        }
    }

    const ctx = document.getElementById("graficoVeiculos").getContext("2d");

new Chart(ctx, {    
        type: "bar",
        data: {
            labels: placas,
            datasets: [{
                label: "Mensalidade",
                data: valores
            }]
        },
        options: {
            responsive: true,
            plugins:{
                legend:{display:false},
                title:{
                    display:true,
                    text:"Valor x Placas"
                }
            },
            scales:{
                y:{
                    beginAtZero:true
                }
            }
        }
    });

})
.catch(err => console.error("Erro ao carregar planilha:", err));

</script>

</body>
</html>
