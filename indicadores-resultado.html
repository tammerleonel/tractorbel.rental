<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relatório Financeiro Rental</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    font-family: Arial;
    background:#f5f6fa;
    padding:20px;
}

.card{
    background:white;
    padding:20px;
    margin-bottom:20px;
    border-radius:10px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.cards{
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
    margin-bottom:20px;
}

.total{
    font-size:26px;
    font-weight:bold;
    color:green;
}

select, button{
    padding:8px;
    margin-right:10px;
    margin-bottom:10px;
}

canvas{
    background:white;
    padding:15px;
    border-radius:10px;
}
</style>

</head>

<body>

<h2>Relatório Financeiro Rental</h2>

<input type="file" id="upload" accept=".xls,.xlsx">
<button onclick="carregarDados()">Carregar</button>

<br><br>

<label>Filial</label> <select id="filtroFilial"></select>

<label>Patrimônio</label> <select id="filtroPatrimonio"></select>

<label>Série</label> <select id="filtroSerie"></select>

<label>Equipamento</label> <select id="filtroEquipamento"></select>

<label>Modelo</label> <select id="filtroModelo"></select>

<label>Cliente</label> <select id="filtroCliente"></select>

<br>

<button onclick="gerarRelatorio()">Gerar Relatório</button>

<div class="cards">
<div class="card"><h4>Faturamento</h4><div class="total" id="cardFat">0</div></div>
<div class="card"><h4>Manutenção</h4><div class="total" id="cardMan">0</div></div>
<div class="card"><h4>Financiamento</h4><div class="total" id="cardFin">0</div></div>
<div class="card"><h4>Impostos</h4><div class="total" id="cardImp">0</div></div>
<div class="card"><h4>Tx Adm</h4><div class="total" id="cardAdm">0</div></div>
<div class="card"><h4>Resultado</h4><div class="total" id="cardRes">0</div></div>
</div>

<div class="card">
<h3>Faturamento por Tipo de Equipamento</h3>
<canvas id="graficoEquipamento"></canvas>
</div>

<div class="card">
<h3>% Faturamento por Cliente</h3>
<canvas id="graficoFatCliente"></canvas>
</div>

<div class="card">
<h3>% Manutenção por Cliente</h3>
<canvas id="graficoManCliente"></canvas>
</div>

<div class="card">
<h3>% Resultado por Cliente</h3>
<canvas id="graficoResCliente"></canvas>
</div>

<script>

let dados = [];
let charts = [];

function num(v){
    if(!v) return 0;
    if(typeof v === "number") return v;
    return parseFloat(v.toString().replace(/\./g,'').replace(',','.')) || 0;
}

function carregarDados(){

    const file = document.getElementById("upload").files[0];
    if(!file){
        alert("Selecione o arquivo");
        return;
    }

    const reader = new FileReader();

    reader.onload = function(e){

        try{

            const workbook = XLSX.read(e.target.result, {type:'binary'});

            let sheetName = workbook.SheetNames.find(n => 
                n.toLowerCase().includes("relat")
            );

            if(!sheetName){
                alert("Aba Relatório não encontrada");
                return;
            }

            const sheet = workbook.Sheets[sheetName];
            dados = XLSX.utils.sheet_to_json(sheet);

            if(dados.length === 0){
                alert("Planilha sem dados");
                return;
            }

            preencherFiltros();
            alert("Dados carregados com sucesso");

        }catch(err){
            console.error(err);
            alert("Erro ao ler planilha");
        }
    };

    reader.readAsBinaryString(file);
}

function preencherFiltros(){

    preencher("filtroFilial", dados.map(d=>d["Filial"]));
    preencher("filtroPatrimonio", dados.map(d=>d["Patrimônio"]));
    preencher("filtroSerie", dados.map(d=>d["Série"]));
    preencher("filtroEquipamento", dados.map(d=>d["Equipamento"]));
    preencher("filtroModelo", dados.map(d=>d["Modelo"]));
    preencher("filtroCliente", dados.map(d=>d["Cliente"]));
}

function preencher(id, valores){

    const sel = document.getElementById(id);
    sel.innerHTML = "<option value=''>Todos</option>";

    [...new Set(valores)]
    .filter(v=>v)
    .sort()
    .forEach(v=>{
        sel.innerHTML += `<option value="${v}">${v}</option>`;
    });
}

function filtrar(){

    return dados.filter(l=>{

        return (!filtroFilial.value || l["Filial"]==filtroFilial.value)
        && (!filtroPatrimonio.value || l["Patrimônio"]==filtroPatrimonio.value)
        && (!filtroSerie.value || l["Série"]==filtroSerie.value)
        && (!filtroEquipamento.value || l["Equipamento"]==filtroEquipamento.value)
        && (!filtroModelo.value || l["Modelo"]==filtroModelo.value)
        && (!filtroCliente.value || l["Cliente"]==filtroCliente.value);
    });
}

function gerarRelatorio(){

    charts.forEach(c=>c.destroy());
    charts=[];

    const base = filtrar();

    let fat=0, man=0, fin=0, imp=0, adm=0;

    const fatCliente={}, manCliente={}, resCliente={}, equip={};

    base.forEach(l=>{

        const faturamento = num(l["Faturamento"]);
        const manut = num(l["Manutenção"]);
        const financ = num(l["Financiamento"]);
        const imposto = num(l["Impostos"]);
        const tx = num(l["Tx Adm"]);

        const cliente = l["Cliente"] || "Não informado";
        const tipo = l["Equipamento"] || "Outros";

        const resultado = faturamento - manut - financ - tx;

        fat+=faturamento;
        man+=manut;
        fin+=financ;
        imp+=imposto;
        adm+=tx;

        fatCliente[cliente]=(fatCliente[cliente]||0)+faturamento;
        manCliente[cliente]=(manCliente[cliente]||0)+manut;
        resCliente[cliente]=(resCliente[cliente]||0)+resultado;
        equip[tipo]=(equip[tipo]||0)+faturamento;
    });

    document.getElementById("cardFat").innerText = fat.toLocaleString("pt-BR");
    document.getElementById("cardMan").innerText = man.toLocaleString("pt-BR");
    document.getElementById("cardFin").innerText = fin.toLocaleString("pt-BR");
    document.getElementById("cardImp").innerText = imp.toLocaleString("pt-BR");
    document.getElementById("cardAdm").innerText = adm.toLocaleString("pt-BR");
    document.getElementById("cardRes").innerText = (fat-man-fin-adm).toLocaleString("pt-BR");

    criarGrafico("graficoEquipamento","bar",equip);
    criarGrafico("graficoFatCliente","pie",fatCliente);
    criarGrafico("graficoManCliente","pie",manCliente);
    criarGrafico("graficoResCliente","pie",resCliente);
}

function criarGrafico(id,tipo,dados){

    const chart = new Chart(document.getElementById(id),{
        type:tipo,
        data:{
            labels:Object.keys(dados),
            datasets:[{
                data:Object.values(dados)
            }]
        },
        options:{responsive:true}
    });

    charts.push(chart);
}

</script>

</body>
</html>
