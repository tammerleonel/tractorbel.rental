<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relatório Financeiro Rental</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f5f6fa;
    padding: 20px;
    color: #333;
}

h2 {
    color: #2e7d32;
    margin-bottom: 20px;
}

/* Filtros */
.filters {
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
    margin-bottom: 20px;
    align-items: flex-end;
}

.filters label {
    font-weight: bold;
    margin-right: 5px;
}

.filters input,
.filters select,
.filters button {
    padding: 8px 12px;
    border-radius: 6px;
    border: 1px solid #ccc;
    font-size: 14px;
}

.filters select[multiple] {
    height: 120px;
}

/* Cards */
.cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 15px;
    margin-bottom: 20px;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.card:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 15px rgba(0,0,0,0.15);
}

.card h3, .card h4 {
    color: #2e7d32;
    margin-bottom: 10px;
}

.total {
    font-size: 24px;
    font-weight: bold;
    color: #2e7d32;
}

/* Gráficos */
canvas {
    background: white;
    padding: 15px;
    border-radius: 12px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
}

/* Responsividade */
@media (max-width: 768px) {
    .filters {
        flex-direction: column;
        align-items: stretch;
    }
    .filters input,
    .filters select,
    .filters button {
        width: 100%;
    }
}
</style>
</head>

<body>

<h2>Relatório Financeiro Rental</h2>

<div class="filters">
    <input type="file" id="upload" accept=".xls,.xlsx">
    <button id="btnCarregar">Carregar</button>
    <span id="statusCarga"></span>

    <label>Data Inicio</label>
    <input type="date" id="dataInicio">

    <label>Data Fim</label>
    <input type="date" id="dataFim">

    <label>Filial</label>
    <select multiple class="multi" id="filtroFilial"></select>

    <label>Patrimônio</label>
    <select multiple class="multi" id="filtroPatrimonio"></select>

    <label>Série</label>
    <select multiple class="multi" id="filtroSerie"></select>

    <label>Equipamento</label>
    <select multiple class="multi" id="filtroEquipamento"></select>

    <label>Cliente</label>
    <select multiple class="multi" id="filtroCliente"></select>

    <button id="btnRelatorio" style="display:none">Gerar Relatório</button>
</div>

<div class="cards">
    <div class="card"><h4>Faturamento</h4><div class="total" id="cardFat">0</div></div>
    <div class="card"><h4>Manutenção</h4><div class="total" id="cardMan">0</div></div>
    <div class="card"><h4>Resultado</h4><div class="total" id="cardRes">0</div></div>
    <div class="card"><h4>Financiamento</h4><div class="total" id="cardFin">0</div></div>
    <div class="card"><h4>Impostos</h4><div class="total" id="cardImp">0</div></div>
    <div class="card"><h4>Tx Administrativa</h4><div class="total" id="cardTx">0</div></div>
    <div class="card"><h4>MAU</h4><div class="total" id="cardMau">0</div></div>
</div>

<div class="card">
    <h3>Faturamento x Equipamento</h3>
    <canvas id="graficoEquipamento"></canvas>
</div>

<div class="card">
    <h3>Faturamento x Cliente</h3>
    <canvas id="graficoCliente"></canvas>
</div>

<div class="card">
    <h3>Manutenção x Cliente</h3>
    <canvas id="graficoManutencao"></canvas>
</div>

<div class="card">
    <h3>Déficit x Cliente</h3>
    <canvas id="graficoDeficit"></canvas>
</div>

<!-- Seu script JavaScript permanece o mesmo -->

</body>
</html>
