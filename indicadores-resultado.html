<script type="module">

let dadosGlobais = [];
let graficos = [];

function numero(v){
    if(!v) return 0;
    if(typeof v === "number") return v;
    return parseFloat(v.toString().replace(/\./g,'').replace(',','.')) || 0;
}

window.carregarDados = function(){

    const file = document.getElementById('upload').files[0];
    if(!file) return alert("Selecione o arquivo");

    const reader = new FileReader();

    reader.onload = function(e){

        const data = new Uint8Array(e.target.result);
        const wb = XLSX.read(data,{type:'array'});
        const ws = wb.Sheets[wb.SheetNames[0]];

        dadosGlobais = XLSX.utils.sheet_to_json(ws);
        atualizarFiltros(dadosGlobais);
    };

    reader.readAsArrayBuffer(file);
}

window.gerarGraficos = function(){
    const filtrado = filtrarDados();
    calcularIndicadores(filtrado);
}

function filtrarDados(){

    const cliente = filtroCliente.value;
    const tag = filtroTag.value;
    const tipo = filtroTipo.value;
    const modelo = filtroModelo.value;
    const serie = filtroSerie.value;

    return dadosGlobais.filter(l =>

        (!cliente || l["Cliente"] == cliente) &&
        (!tag || l["Patrimônio"] == tag) &&
        (!tipo || l["Tipo"] == tipo) &&
        (!modelo || l["Modelo"] == modelo) &&
        (!serie || l["Série"] == serie)
    );
}

function calcularIndicadores(dados){

    let totalEquip = 0;

    let totalFaturamento = 0;
    let totalManutencao = 0;
    let totalFinanciamento = 0;
    let totalImpostos = 0;
    let totalAdm = 0;
    let totalResultado = 0;

    const porCliente = {};
    const porModelo = {};

    dados.forEach(l =>{

        const faturamento = numero(l["Faturamento"]);
        const manutencao = numero(l["Manutenção"]);
        const financiamento = numero(l["Financiamento"]);
        const impostos = numero(l["Impostos"]);
        const adm = numero(l["Tx Adm"] || l["Taxa Adm"]);

        const resultado = faturamento - manutencao - financiamento - impostos - adm;

        if(faturamento || manutencao){

            totalEquip++;

            totalFaturamento += faturamento;
            totalManutencao += manutencao;
            totalFinanciamento += financiamento;
            totalImpostos += impostos;
            totalAdm += adm;
            totalResultado += resultado;

            const cliente = l["Cliente"] || "Não informado";
            porCliente[cliente] = (porCliente[cliente] || 0) + resultado;

            const modelo = l["Modelo"] || "Não informado";
            porModelo[modelo] = (porModelo[modelo] || 0) + 1;
        }

    });

    totalAtendimento.innerText = totalEquip;

    const tbody = document.getElementById("tabelaModelos");
    tbody.innerHTML = "";

    for(const m in porModelo){
        tbody.innerHTML += `
        <tr>
            <td>${m}</td>
            <td>${porModelo[m]}</td>
        </tr>`;
    }

    criarGraficosClientes(porCliente);
}

function criarGraficosClientes(dados){

    graficos.forEach(g => g.destroy());
    graficos = [];

    graficosClientes.innerHTML = "";

    for(const cliente in dados){

        const card = document.createElement("div");
        card.className = "card";

        const h = document.createElement("h3");
        h.innerText = "Resultado Cliente - " + cliente;

        const canvas = document.createElement("canvas");

        card.appendChild(h);
        card.appendChild(canvas);
        graficosClientes.appendChild(card);

        const g = new Chart(canvas,{
            type:"bar",
            data:{
                labels:["Resultado"],
                datasets:[{
                    data:[dados[cliente]]
                }]
            },
            options:{
                responsive:true,
                plugins:{legend:{display:false}}
            }
        });

        graficos.push(g);
    }
}
