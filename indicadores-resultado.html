<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relatório Financeiro Rental</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    font-family: Arial;
    background:#f5f6fa;
    padding:20px;
}
.card{
    background:white;
    padding:20px;
    margin-bottom:20px;
    border-radius:10px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}
.cards{
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
    margin-bottom:20px;
}
.total{
    font-size:22px;
    font-weight:bold;
    color:green;
}
select, button, input{
    padding:8px;
    margin-right:10px;
    margin-bottom:10px;
}
canvas{
    background:white;
    padding:15px;
    border-radius:10px;
}
.multi{
    width:220px;
    height:120px;
}
</style>
</head>

<body>

<h2>Relatório Financeiro Rental</h2>

<input type="file" id="upload" accept=".xls,.xlsx">
<button id="btnCarregar" onclick="carregarDados()">Carregar</button>
<span id="statusCarga" style="margin-left:10px;color:#555"></span>

<br><br>

<label>Data Inicio</label>
<input type="date" id="dataInicio">

<label>Data Fim</label>
<input type="date" id="dataFim">

<br><br>

<label>Filial</label>
<select multiple class="multi" id="filtroFilial"></select>

<label>Patrimônio</label>
<select multiple class="multi" id="filtroPatrimonio"></select>

<label>Série</label>
<select multiple class="multi" id="filtroSerie"></select>

<label>Equipamento</label>
<select multiple class="multi" id="filtroEquipamento"></select>

<label>Cliente</label>
<select multiple class="multi" id="filtroCliente"></select>

<br>

<button id="btnRelatorio" onclick="gerarRelatorio()" style="display:none">
Gerar Relatório
</button>

<div class="cards">
<div class="card"><h4>Faturamento</h4><div class="total" id="cardFat">0</div></div>
<div class="card"><h4>Manutenção</h4><div class="total" id="cardMan">0</div></div>
<div class="card"><h4>Financiamento</h4><div class="total" id="cardFin">0</div></div>
<div class="card"><h4>Impostos</h4><div class="total" id="cardImp">0</div></div>
<div class="card"><h4>Tx Administrativa</h4><div class="total" id="cardAdm">0</div></div>
<div class="card"><h4>Resultado</h4><div class="total" id="cardRes">0</div></div>
<div class="card"><h4>Cobrança Mau Uso</h4><div class="total" id="cardMau">0</div></div>
</div>

<div class="card">
<h3>Faturamento x Tipo de equipamento</h3>
<canvas id="graficoEquipamento"></canvas>
</div>

<div class="card">
<h3>Faturamento x Cliente</h3>
<canvas id="graficoFatCliente"></canvas>
</div>

<div class="card">
<h3>Custo de Manutenção x Cliente</h3>
<canvas id="graficoManCliente"></canvas>
</div>

<div class="card">
<h3>Contratos com déficit x Cliente</h3>
<canvas id="graficoDeficit"></canvas>
</div>

<script>

let dados=[];
let charts=[];

function num(v){
    if(!v) return 0;
    if(typeof v === "number") return v;
    return parseFloat(v.toString().replace(/\./g,'').replace(',','.')) || 0;
}

function carregarDados(){

    const file = document.getElementById("upload").files[0];

    if(!file){
        alert("Selecione um arquivo");
        return;
    }

    btnCarregar.disabled = true;
    btnRelatorio.style.display = "none";
    statusCarga.innerText = "Carregando dados...";

    const reader = new FileReader();

    reader.onload = e => {

        setTimeout(()=>{

            const workbook = XLSX.read(e.target.result,{type:'binary'});
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const json = XLSX.utils.sheet_to_json(sheet,{header:1});

            dados = [];
            let i = 1;

            function processarLote(){

                const limite = Math.min(i + 300, json.length);

                for(; i < limite; i++){

                    const l = json[i];

                    dados.push({
                        filial:l[0],
                        patrimonio:l[1],
                        serie:l[2],
                        equipamento:l[3],
                        faturamento:num(l[7]),
                        manutencao:num(l[8]),
                        financiamento:num(l[9]),
                        impostos:num(l[10]),
                        tx:num(l[11]),
                        resultado:num(l[12]),
                        mau:num(l[13]),
                        cliente:l[14],
                        data: new Date(l[15])
                    });
                }

                statusCarga.innerText = "Processando " + i + " de " + json.length;

                if(i < json.length){
                    setTimeout(processarLote,0);
                }else{
                    preencherFiltros();
                    statusCarga.innerText = "Dados carregados ✔";
                    btnRelatorio.style.display = "inline-block";
                    btnCarregar.disabled = false;
                }
            }

            processarLote();

        },50);
    };

    reader.readAsBinaryString(file);
}

</script>

</body>
</html>
