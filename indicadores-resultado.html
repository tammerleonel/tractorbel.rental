<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resultado Cliente</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    font-family: Arial;
    background:#f5f6fa;
    padding:20px;
}

.card{
    background:white;
    padding:20px;
    margin-bottom:20px;
    border-radius:10px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.total{
    font-size:28px;
    font-weight:bold;
    color:green;
}

table{
    width:100%;
    border-collapse:collapse;
}

th, td{
    padding:10px;
    border-bottom:1px solid #ddd;
}

th{
    background:green;
    color:white;
}

select{
    padding:8px;
    margin-right:10px;
    margin-bottom:10px;
}
</style>

</head>

<body>

<h2>Resultado Cliente</h2>

<input type="file" id="upload" accept=".xls,.xlsx">

<br><br>

<label>Patrimônio</label>
<select id="filtroTag"><option value="">Todos</option></select>

<label>Tipo de equipamento</label>
<select id="filtroTipo"><option value="">Todos</option></select>

<label>Modelo</label>
<select id="filtroModelo"><option value="">Todos</option></select>

<label>Nº Série</label>
<select id="filtroSerie"><option value="">Todos</option></select>

<div class="card">
<h3>Total de equipamentos com despesas lançadas</h3>
<div class="total" id="totalAtendimento">0</div>
</div>

<div class="card">
<h3>Total por Modelo</h3>
<table>
<thead>
<tr>
<th>Modelo</th>
<th>Quantidade</th>
</tr>
</thead>
<tbody id="tabelaModelos"></tbody>
</table>
</div>

<div id="graficosClientes"></div>

<script>

let dadosGlobais = [];
let graficos = [];

document.getElementById('upload').addEventListener('change', function(e){

    const file = e.target.files[0];
    const reader = new FileReader();

    reader.onload = function(event){

        const data = new Uint8Array(event.target.result);
        const workbook = XLSX.read(data, {type:'array'});
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        const json = XLSX.utils.sheet_to_json(sheet);

        dadosGlobais = json;

        popularFiltros(json);
        aplicarFiltros();
    };

    reader.readAsArrayBuffer(file);
});

document.querySelectorAll("select").forEach(s=>{
    s.addEventListener("change", aplicarFiltros);
});

function popularFiltros(dados){

    preencherSelect("filtroTag", dados, "TAG");
    preencherSelect("filtroTipo", dados, "Tipo de Tecnologia");
    preencherSelect("filtroModelo", dados, "Modelo");
    preencherSelect("filtroSerie", dados, "Nº Série");
}

function preencherSelect(id, dados, coluna){

    const select = document.getElementById(id);
    select.innerHTML = '<option value="">Todos</option>';

    const valores = [...new Set(dados.map(l => l[coluna]).filter(v => v))];

    valores.sort().forEach(v=>{
        select.innerHTML += `<option value="${v}">${v}</option>`;
    });
}

function aplicarFiltros(){

    const tag = document.getElementById("filtroTag").value;
    const tipo = document.getElementById("filtroTipo").value;
    const modelo = document.getElementById("filtroModelo").value;
    const serie = document.getElementById("filtroSerie").value;

    const filtrado = dadosGlobais.filter(linha =>{

        return (!tag || linha["TAG"] == tag) &&
               (!tipo || linha["Tipo de Tecnologia"] == tipo) &&
               (!modelo || linha["Modelo"] == modelo) &&
               (!serie || linha["Nº Série"] == serie);
    });

    calcularTotais(filtrado);
}

function calcularTotais(dados){

    const totaisModelo = {};
    const totaisCliente = {};
    let totalEquipamentos = 0;

    dados.forEach(linha => {

        const total = Number(linha["Total"]) || 0;

        if(total > 0){

            totalEquipamentos++;

            const modelo = linha["Modelo"] || "Não informado";
            totaisModelo[modelo] = (totaisModelo[modelo] || 0) + 1;

            const cliente = linha["Solicitante / Localização"] || "Não informado";

            totaisCliente[cliente] = (totaisCliente[cliente] || 0) + total;
        }
    });

    document.getElementById("totalAtendimento").innerText = totalEquipamentos;

    const tbody = document.getElementById("tabelaModelos");
    tbody.innerHTML = "";

    for(const modelo in totaisModelo){
        tbody.innerHTML += `<tr><td>${modelo}</td><td>${totaisModelo[modelo]}</td></tr>`;
    }

    criarGraficosClientes(totaisCliente);
}

function criarGraficosClientes(dados){

    graficos.forEach(g => g.destroy());
    graficos = [];

    const container = document.getElementById("graficosClientes");
    container.innerHTML = "";

    for(const cliente in dados){

        const valor = dados[cliente];
        if(valor <= 0) continue;

        const card = document.createElement("div");
        card.className = "card";

        const titulo = document.createElement("h3");
        titulo.innerText = "Resultado Cliente - " + cliente;

        const canvas = document.createElement("canvas");

        card.appendChild(titulo);
        card.appendChild(canvas);
        container.appendChild(card);

        const grafico = new Chart(canvas,{
            type:'bar',
            data:{
                labels:["Total"],
                datasets:[{
                    label:"Resultado Cliente",
                    data:[valor]
                }]
            },
            options:{
                responsive:true,
                plugins:{
                    legend:{display:false}
                }
            }
        });

        graficos.push(grafico);
    }
}

</script>

</body>
</html>
