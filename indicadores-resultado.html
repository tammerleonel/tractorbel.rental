<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relatório Financeiro Rental</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    font-family: Arial;
    background:#f5f6fa;
    padding:20px;
}
.card{
    background:white;
    padding:20px;
    margin-bottom:20px;
    border-radius:10px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}
.cards{
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
    margin-bottom:20px;
}
.total{
    font-size:22px;
    font-weight:bold;
    color:green;
}
select, button, input{
    padding:8px;
    margin-right:10px;
    margin-bottom:10px;
}
canvas{
    background:white;
    padding:15px;
    border-radius:10px;
}
.multi{
    width:220px;
    height:120px;
}
</style>
</head>

<body>

<h2>Relatório Financeiro Rental</h2>

<input type="file" id="upload" accept=".xls,.xlsx">
<button id="btnCarregar">Carregar</button>
<span id="statusCarga"></span>

<br><br>

<label>Data Inicio</label>
<input type="date" id="dataInicio">

<label>Data Fim</label>
<input type="date" id="dataFim">

<br><br>

<label>Filial</label>
<select multiple class="multi" id="filtroFilial"></select>

<label>Patrimônio</label>
<select multiple class="multi" id="filtroPatrimonio"></select>

<label>Série</label>
<select multiple class="multi" id="filtroSerie"></select>

<label>Equipamento</label>
<select multiple class="multi" id="filtroEquipamento"></select>

<label>Cliente</label>
<select multiple class="multi" id="filtroCliente"></select>

<br>

<button id="btnRelatorio" style="display:none">Gerar Relatório</button>

<div class="cards">
<div class="card"><h4>Faturamento</h4><div class="total" id="cardFat">0</div></div>
<div class="card"><h4>Custo de Manutenção</h4><div class="total" id="cardMan">0</div></div>
<div class="card"><h4>Resultado</h4><div class="total" id="cardRes">0</div></div>
<div class="card"><h4>Financiamento</h4><div class="total" id="cardFin">0</div></div>
<div class="card"><h4>Impostos</h4><div class="total" id="cardImp">0</div></div>
<div class="card"><h4>Taxa Administrativa</h4><div class="total" id="cardTx">0</div></div>
<div class="card"><h4>Faturamento Avaria</h4><div class="total" id="cardMau">0</div></div>
</div>

<div class="card">
<h3>Faturamento x Equipamento</h3>
<canvas id="graficoEquipamento"></canvas>
</div>

<div class="card">
<h3>Faturamento x Cliente</h3>
<canvas id="graficoCliente"></canvas>
</div>

<div class="card">
<h3>Manutenção x Cliente</h3>
<canvas id="graficoManutencao"></canvas>
</div>

<div class="card">
<h3>Déficit x Cliente</h3>
<canvas id="graficoDeficit"></canvas>
</div>

<script>

let dados=[];
let charts=[];

function num(v){
    if(!v) return 0;
    if(typeof v === "number") return v;
    return parseFloat(v.toString().replace(/\./g,'').replace(',','.')) || 0;
}

document.getElementById("btnCarregar").onclick = carregarDados;
document.getElementById("btnRelatorio").onclick = gerarRelatorio;

function carregarDados(){

    const file = upload.files[0];
    if(!file){
        alert("Selecione um arquivo");
        return;
    }

    statusCarga.innerText="Carregando...";

    const reader = new FileReader();

    reader.onload = e => {

        const workbook = XLSX.read(e.target.result,{type:'binary'});
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        const json = XLSX.utils.sheet_to_json(sheet,{header:1});

        dados=[];

        for(let i=1;i<json.length;i++){

            const l=json[i];

            const dataExcel=l[15];
            let data=null;

            if(typeof dataExcel === "number"){
                data = new Date((dataExcel - 25569) * 86400 * 1000);
            }else{
                data = new Date(dataExcel);
            }

            dados.push({
                filial:l[0],
                patrimonio:l[1],
                serie:l[2],
                equipamento:l[3],
                faturamento:num(l[7]),
                manutencao:num(l[8]),
                financiamento:num(l[9]),
                impostos:num(l[10]),
                tx:num(l[11]),
                resultado:num(l[12]),
                mau:num(l[13]),
                cliente:l[14],
                data:data
            });
        }

        preencherFiltros();

        statusCarga.innerText="Dados carregados ✔";
        btnRelatorio.style.display="inline-block";
    };

    reader.readAsBinaryString(file);
}

function preencherFiltros(){
    preencher("filtroFilial","filial");
    preencher("filtroPatrimonio","patrimonio");
    preencher("filtroSerie","serie");
    preencher("filtroEquipamento","equipamento");
    preencher("filtroCliente","cliente");
}

function preencher(id,campo){
    const select=document.getElementById(id);
    select.innerHTML="";
    select.multiple=true;
    [...new Set(dados.map(d=>d[campo]).filter(Boolean))]
    .sort()
    .forEach(v=>{
        const o=document.createElement("option");
        o.value=v;
        o.text=v;
        select.appendChild(o);
    });
}

function multi(id){
    return [...document.getElementById(id).selectedOptions].map(o=>o.value);
}

function gerarRelatorio(){

    const dtIni=dataInicio.value?new Date(dataInicio.value):null;
    const dtFim=dataFim.value?new Date(dataFim.value):null;

    const filtrado=dados.filter(d=>
        (!dtIni || d.data>=dtIni) &&
        (!dtFim || d.data<=dtFim) &&
        (!multi("filtroFilial").length || multi("filtroFilial").includes(d.filial)) &&
        (!multi("filtroPatrimonio").length || multi("filtroPatrimonio").includes(d.patrimonio)) &&
        (!multi("filtroSerie").length || multi("filtroSerie").includes(d.serie)) &&
        (!multi("filtroEquipamento").length || multi("filtroEquipamento").includes(d.equipamento)) &&
        (!multi("filtroCliente").length || multi("filtroCliente").includes(d.cliente))
    );

    let fat=0,man=0,res=0,fin=0,imp=0,tx=0,mau=0;

    const equip={},cliente={},manCliente={},deficit={};

    filtrado.forEach(d=>{
        fat+=d.faturamento;
        man+=d.manutencao;
        res+=d.resultado;
        fin+=d.financiamento;
        imp+=d.impostos;
        tx+=d.tx;
        mau+=d.mau;

        equip[d.equipamento]=(equip[d.equipamento]||0)+d.faturamento;
        cliente[d.cliente]=(cliente[d.cliente]||0)+d.faturamento;
        manCliente[d.cliente]=(manCliente[d.cliente]||0)+d.manutencao;

        if(d.resultado<0){
            deficit[d.cliente]=(deficit[d.cliente]||0)+d.resultado;
        }
    });

    // Atualiza os cards
    cardFat.innerText=fat.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
    cardMan.innerText=man.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
    cardRes.innerText=res.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
    cardFin.innerText=fin.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
    cardImp.innerText=imp.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
    cardTx.innerText=tx.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
    cardMau.innerText=mau.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});

    // Remove gráficos antigos
    charts.forEach(c=>c.destroy());
    charts=[];

    // Filtra valores > 0 para todos os gráficos
    const equipLabels = Object.keys(equip).filter(k=>equip[k]>0);
    const equipData = equipLabels.map(k=>equip[k]);

    const clienteLabels = Object.keys(cliente).filter(k=>cliente[k]>0);
    const clienteData = clienteLabels.map(k=>cliente[k]);

    const manLabels = Object.keys(manCliente).filter(k=>manCliente[k]>0);
    const manData = manLabels.map(k=>manCliente[k]);

    const deficitLabels = Object.keys(deficit).filter(k=>deficit[k]<0); // somente negativos
    const deficitData = deficitLabels.map(k=>deficit[k]);

    charts.push(new Chart(graficoEquipamento,{
        type:'bar',
        data:{labels:equipLabels,datasets:[{data:equipData}]}
    }));

    charts.push(new Chart(graficoCliente,{
        type:'pie',
        data:{labels:clienteLabels,datasets:[{data:clienteData}]}
    }));

    charts.push(new Chart(graficoManutencao,{
        type:'pie',
        data:{labels:manLabels,datasets:[{data:manData}]}
    }));

    charts.push(new Chart(graficoDeficit,{
        type:'bar',
        data:{labels:deficitLabels,datasets:[{data:deficitData}]}
    }));
}

</script>

</body>
</html>
