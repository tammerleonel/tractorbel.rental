<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relatório custo operacional por Cliente</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    font-family: Arial;
    background:#f5f6fa;
    padding:20px;
}

.card{
    background:white;
    padding:20px;
    margin-bottom:20px;
    border-radius:10px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.total{
    font-size:28px;
    font-weight:bold;
    color:green;
}

table{
    width:100%;
    border-collapse:collapse;
}

th, td{
    padding:10px;
    border-bottom:1px solid #ddd;
}

th{
    background:green;
    color:white;
}

select, button{
    padding:8px;
    margin-right:10px;
    margin-bottom:10px;
}
</style>

</head>

<body>

<h2>Resultado Cliente</h2>

<input type="file" id="upload" accept=".xls,.xlsx">
<button onclick="carregarDados()">Carregar Dados</button>

<br><br>

<label>Cliente</label>
<select id="filtroCliente"><option value="">Todos</option></select>

<label>Patrimônio</label>
<select id="filtroTag"><option value="">Todos</option></select>

<label>Tipo de equipamento</label>
<select id="filtroTipo"><option value="">Todos</option></select>

<label>Modelo</label>
<select id="filtroModelo"><option value="">Todos</option></select>

<label>Nº Série</label>
<select id="filtroSerie"><option value="">Todos</option></select>

<br>

<button onclick="gerarGraficos()">Gerar Gráficos</button>

<div class="card">
<h3>Total de equipamentos com despesas lançadas</h3>
<div class="total" id="totalAtendimento">0</div>
</div>

<div class="card">
<h3>Total por Modelo</h3>
<table>
<thead>
<tr>
<th>Modelo</th>
<th>Quantidade</th>
</tr>
</thead>
<tbody id="tabelaModelos"></tbody>
</table>
</div>

<div id="graficosClientes"></div>

<script type="module">

let dadosGlobais = [];
let graficos = [];

function numero(v){
    if(!v) return 0;
    if(typeof v === "number") return v;
    return parseFloat(v.toString().replace(/\./g,'').replace(',','.')) || 0;
}

function get(linha, nomes){
    for(const n of nomes){
        if(linha[n] !== undefined) return linha[n];
    }
    return null;
}

window.carregarDados = function(){

    const file = document.getElementById('upload').files[0];
    if(!file) return alert("Selecione o arquivo");

    const reader = new FileReader();

    reader.onload = function(e){

        const data = new Uint8Array(e.target.result);
        const wb = XLSX.read(data,{type:'array'});
        const ws = wb.Sheets[wb.SheetNames[0]];

        dadosGlobais = XLSX.utils.sheet_to_json(ws);
        atualizarFiltros(dadosGlobais);
    };

    reader.readAsArrayBuffer(file);
}

window.gerarGraficos = function(){
    const filtrado = filtrarDados();
    calcularIndicadores(filtrado);
}

function filtrarDados(){

    const cliente = filtroCliente.value;
    const tag = filtroTag.value;
    const tipo = filtroTipo.value;
    const modelo = filtroModelo.value;
    const serie = filtroSerie.value;

    return dadosGlobais.filter(l =>

        (!cliente || get(l,["Cliente","Solicitante / Localização"]) == cliente) &&
        (!tag || get(l,["Patrimônio","TAG"]) == tag) &&
        (!tipo || get(l,["Tipo","Tipo de Tecnologia"]) == tipo) &&
        (!modelo || get(l,["Modelo"]) == modelo) &&
        (!serie || get(l,["Série","Nº Série"]) == serie)
    );
}

function atualizarFiltros(dados){

    preencherSelect("filtroCliente", dados, ["Cliente","Solicitante / Localização"]);
    preencherSelect("filtroTag", dados, ["Patrimônio","TAG"]);
    preencherSelect("filtroTipo", dados, ["Tipo","Tipo de Tecnologia"]);
    preencherSelect("filtroModelo", dados, ["Modelo"]);
    preencherSelect("filtroSerie", dados, ["Série","Nº Série"]);
}

function preencherSelect(id, dados, colunas){

    const select = document.getElementById(id);
    const valorAtual = select.value;

    select.innerHTML = '<option value="">Todos</option>';

    const valores = [...new Set(
        dados.map(l => get(l,colunas)).filter(v => v)
    )];

    valores.sort().forEach(v=>{
        select.innerHTML += `<option value="${v}">${v}</option>`;
    });

    select.value = valorAtual;
}

function calcularIndicadores(dados){

    let totalEquip = 0;

    const porCliente = {};
    const porModelo = {};

    dados.forEach(l =>{

        const faturamento = numero(get(l,["Faturamento","Receita","Total Receita"]));
        const manutencao = numero(get(l,["Manutenção","Custo Manutenção"]));
        const financiamento = numero(get(l,["Financiamento"]));
        const impostos = numero(get(l,["Impostos"]));
        const adm = numero(get(l,["Taxa Adm","Tx Adm"]));

        const resultado = faturamento - manutencao - financiamento - impostos - adm;

        if(faturamento || manutencao){

            totalEquip++;

            const cliente = get(l,["Cliente","Solicitante / Localização"]) || "Não informado";
            porCliente[cliente] = (porCliente[cliente] || 0) + resultado;

            const modelo = get(l,["Modelo"]) || "Não informado";
            porModelo[modelo] = (porModelo[modelo] || 0) + 1;
        }
    });

    document.getElementById("totalAtendimento").innerText = totalEquip;

    const tbody = document.getElementById("tabelaModelos");
    tbody.innerHTML = "";

    for(const m in porModelo){
        tbody.innerHTML += `
        <tr>
            <td>${m}</td>
            <td>${porModelo[m]}</td>
        </tr>`;
    }

    criarGraficosClientes(porCliente);
}

function criarGraficosClientes(dados){

    graficos.forEach(g => g.destroy());
    graficos = [];

    graficosClientes.innerHTML = "";

    for(const cliente in dados){

        const card = document.createElement("div");
        card.className = "card";

        const h = document.createElement("h3");
        h.innerText = "Resultado Cliente - " + cliente;

        const canvas = document.createElement("canvas");

        card.appendChild(h);
        card.appendChild(canvas);
        graficosClientes.appendChild(card);

        const g = new Chart(canvas,{
            type:"bar",
            data:{
                labels:["Resultado"],
                datasets:[{
                    data:[dados[cliente]]
                }]
            },
            options:{
                responsive:true,
                plugins:{legend:{display:false}}
            }
        });

        graficos.push(g);
    }
}

</script>

</body>
</html>
