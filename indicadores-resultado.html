<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relatório Financeiro Rental</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    font-family: Arial;
    background:#f5f6fa;
    padding:20px;
}
.card{
    background:white;
    text-align: center;
    padding:20px;
    margin-bottom:20px;
    border-radius:10px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}
.cards{
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
    margin-bottom:20px;
}
.total{
    font-size:22px;
    font-weight:bold;
    color:green;
    text-align: center;
}
select, button, input{
    padding:8px;
    margin-right:10px;
    margin-bottom:10px;
}
canvas{
    background:white;
    padding:15px;
    border-radius:10px;
}
.multi{
    width:220px;
    height:120px;
}
</style>
</head>

<body>

<h2>Relatório Financeiro Rental</h2>

<input type="file" id="upload" accept=".xls,.xlsx">
<button id="btnCarregar">Carregar</button>
<span id="statusCarga"></span>

<br><br>

<label>Data Inicio</label>
<input type="date" id="dataInicio" disabled>

<label>Data Fim</label>
<input type="date" id="dataFim" disabled>

<br><br>

<label>Filial</label>
<select multiple class="multi" id="filtroFilial"></select>

<label>Patrimônio</label>
<select multiple class="multi" id="filtroPatrimonio"></select>

<label>Série</label>
<select multiple class="multi" id="filtroSerie"></select>

<label>Equipamento</label>
<select multiple class="multi" id="filtroEquipamento"></select>

<label>Cliente</label>
<select multiple class="multi" id="filtroCliente"></select>

<br>

<button id="btnRelatorio" style="display:none">Gerar Relatório</button>

<div class="cards">
<div class="card"><h4>Faturamento</h4><div class="total" id="cardFat">0</div></div>
<div class="card"><h4>Financiamento</h4><div class="total" id="cardFin">0</div></div>
<div class="card"><h4>Impostos</h4><div class="total" id="cardImp">0</div></div>
<div class="card"><h4>Custo de Manutenção</h4><div class="total" id="cardMan">0</div></div>
<div class="card"><h4>Taxa Administrativa</h4><div class="total" id="cardTx">0</div></div>
<div class="card"><h4>Resultado</h4><div class="total" id="cardRes">0</div></div>
<div class="card"><h4>Faturamento Avaria</h4><div class="total" id="cardMau">0</div></div>
</div>

<div class="card">
<h3>Faturamento x Equipamento</h3>
<canvas id="graficoEquipamento"></canvas>
</div>

<div class="card">
<h3>Faturamento x Cliente</h3>
<canvas id="graficoCliente"></canvas>
</div>

<div class="card">
<h3>Manutenção x Cliente</h3>
<canvas id="graficoManutencao"></canvas>
</div>

<div class="card">
<h3>Déficit x Cliente</h3>
<canvas id="graficoDeficit"></canvas>
</div>

<script>
let dadosGlobais=[];
let graficos=[];

// Função para converter valores numéricos
function converterNumero(valor){
    if(valor === null || valor === undefined || valor === "") return 0;
    if(typeof valor === "number") return valor;
    return parseFloat(valor.toString().replace(/\./g,'').replace(',','.')) || 0;
}

// Inputs de data
const dataInicio = document.getElementById("dataInicio");
const dataFim = document.getElementById("dataFim");

// Habilitar relatório ao alterar datas
dataInicio.addEventListener("change", gerarRelatorio);
dataFim.addEventListener("change", gerarRelatorio);

document.getElementById("btnCarregar").addEventListener("click", carregarDados);
document.getElementById("btnRelatorio").addEventListener("click", gerarRelatorio);

// Carregar arquivo Excel
function carregarDados(){
    const file = document.getElementById("upload").files[0];
    const status = document.getElementById("statusCarga");
    const btnRelatorio = document.getElementById("btnRelatorio");

    if(!file){ alert("Selecione um arquivo"); return; }

    status.innerText="Carregando planilha...";

    const reader = new FileReader();
    reader.onload = function(e){
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, {type:'array'});
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        const json = XLSX.utils.sheet_to_json(sheet,{header:1});

        dadosGlobais=[];

        for(let i=1;i<json.length;i++){
            const l=json[i];
            let dataLinha=l[15];
            if(typeof dataLinha === "number") dataLinha=new Date((dataLinha-25569)*86400*1000);
            else dataLinha=new Date(dataLinha);

            if(!isNaN(dataLinha)){
                dataLinha.setHours(0,0,0,0);
                dadosGlobais.push({
                    filial:l[0],
                    patrimonio:l[1],
                    serie:l[2],
                    equipamento:l[3],
                    faturamento:converterNumero(l[7]),
                    manutencao:converterNumero(l[8]),
                    financiamento:converterNumero(l[9]),
                    impostos:converterNumero(l[10]),
                    tx:converterNumero(l[11]),
                    resultado:converterNumero(l[12]),
                    mau:converterNumero(l[13]),
                    cliente:l[14],
                    data:dataLinha
                });
            }
        }

        // Atualizar datas mínimas e máximas
        const datas = dadosGlobais.map(d=>d.data);
        const minData = new Date(Math.min(...datas));
        const maxData = new Date(Math.max(...datas));
        const formatar = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;

        dataInicio.min=formatar(minData);
        dataInicio.max=formatar(maxData);
        dataFim.min=formatar(minData);
        dataFim.max=formatar(maxData);

        dataInicio.value=formatar(minData);
        dataFim.value=formatar(maxData);

        dataInicio.disabled=false;
        dataFim.disabled=false;

        preencherFiltros();

        status.innerText="Dados carregados ✔";
        btnRelatorio.style.display="inline-block";

        gerarRelatorio();
    };
    reader.readAsArrayBuffer(file);
}

// Preencher filtros
function preencherFiltros(){
    ["filtroFilial","filtroPatrimonio","filtroSerie","filtroEquipamento","filtroCliente"]
    .forEach(id=>{
        const select = document.getElementById(id);
        select.innerHTML="";
        select.multiple=true;
        [...new Set(dadosGlobais.map(d=>d[id.replace("filtro","").toLowerCase()]).filter(Boolean))]
        .sort()
        .forEach(v=>{
            const opt=document.createElement("option");
            opt.value=v; opt.text=v; select.appendChild(opt);
        });
        select.addEventListener("change", gerarRelatorio);
    });
}

// Obter valores selecionados
function getMultiValues(id){
    return [...document.getElementById(id).selectedOptions].map(o=>o.value);
}

// Gerar relatório
function gerarRelatorio(){
    const dtIni = dataInicio.value ? new Date(dataInicio.value) : null;
    const dtFim = dataFim.value ? new Date(dataFim.value) : null;
    if(dtIni) dtIni.setHours(0,0,0,0);
    if(dtFim) dtFim.setHours(23,59,59,999);

    const filtrado = dadosGlobais.filter(d=>
        (!dtIni || d.data>=dtIni) &&
        (!dtFim || d.data<=dtFim) &&
        (!getMultiValues("filtroFilial").length || getMultiValues("filtroFilial").includes(d.filial)) &&
        (!getMultiValues("filtroPatrimonio").length || getMultiValues("filtroPatrimonio").includes(d.patrimonio)) &&
        (!getMultiValues("filtroSerie").length || getMultiValues("filtroSerie").includes(d.serie)) &&
        (!getMultiValues("filtroEquipamento").length || getMultiValues("filtroEquipamento").includes(d.equipamento)) &&
        (!getMultiValues("filtroCliente").length || getMultiValues("filtroCliente").includes(d.cliente))
    );

    // Totais
    let fat=0,man=0,res=0,fin=0,imp=0,tx=0,mau=0;
    const equip={},cliente={},manCliente={},deficit={};

    filtrado.forEach(d=>{
        fat+=d.faturamento; man+=d.manutencao; res+=d.resultado;
        fin+=d.financiamento; imp+=d.impostos; tx+=d.tx; mau+=d.mau;

        equip[d.equipamento]=(equip[d.equipamento]||0)+d.faturamento;
        cliente[d.cliente]=(cliente[d.cliente]||0)+d.faturamento;
        manCliente[d.cliente]=(manCliente[d.cliente]||0)+d.manutencao;
        if(d.resultado<0) deficit[d.cliente]=(deficit[d.cliente]||0)+d.resultado;
    });

    // Atualiza cards
    cardFat.innerText=fat.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
    cardMan.innerText=man.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
    cardRes.innerText=res.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
    cardFin.innerText=fin.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
    cardImp.innerText=imp.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
    cardTx.innerText=tx.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
    cardMau.innerText=mau.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});

    // Atualiza gráficos
    graficos.forEach(c=>c.destroy());
    graficos=[];

    const equipLabels = Object.keys(equip).filter(k=>equip[k]>0);
    const equipData = equipLabels.map(k=>equip[k]);
    const clienteLabels = Object.keys(cliente).filter(k=>cliente[k]>0);
    const clienteData = clienteLabels.map(k=>cliente[k]);
    const manLabels = Object.keys(manCliente).filter(k=>manCliente[k]>0);
    const manData = manLabels.map(k=>manCliente[k]);
    const deficitLabels = Object.keys(deficit).filter(k=>deficit[k]<0);
    const deficitData = deficitLabels.map(k=>Math.abs(deficit[k]));

    graficos.push(new Chart(graficoEquipamento,{type:'bar',data:{labels:equipLabels,datasets:[{data:equipData, backgroundColor:'blue'}]} }));
    graficos.push(new Chart(graficoCliente,{type:'pie',data:{labels:clienteLabels,datasets:[{data:clienteData}]} }));
    graficos.push(new Chart(graficoManutencao,{type:'pie',data:{labels:manLabels,datasets:[{data:manData}]} }));
    graficos.push(new Chart(graficoDeficit,{type:'bar',data:{labels:deficitLabels,datasets:[{data:deficitData, backgroundColor:'red'}]}}));
}
</script>

</body>
</html>
