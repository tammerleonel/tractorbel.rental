<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relatório Financeiro Rental</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    font-family: Arial;
    background:#f5f6fa;
    padding:20px;
}
.card{
    background:white;
    padding:20px;
    margin-bottom:20px;
    border-radius:10px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}
.cards{
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
    margin-bottom:20px;
}
.total{
    font-size:22px;
    font-weight:bold;
    color:green;
}
select, button, input{
    padding:8px;
    margin-right:10px;
    margin-bottom:10px;
}
canvas{
    background:white;
    padding:15px;
    border-radius:10px;
}
.multi{
    width:220px;
    height:120px;
}
</style>
</head>

<body>

<h2>Relatório Financeiro Rental</h2>

<input type="file" id="upload" accept=".xls,.xlsx">
<button id="btnCarregar" onclick="carregarDados()">Carregar</button>
<span id="statusCarga"></span>

<br><br>

<label>Data Inicio</label>
<input type="date" id="dataInicio">

<label>Data Fim</label>
<input type="date" id="dataFim">

<br><br>

<label>Filial</label>
<select multiple class="multi" id="filtroFilial"></select>

<label>Patrimônio</label>
<select multiple class="multi" id="filtroPatrimonio"></select>

<label>Série</label>
<select multiple class="multi" id="filtroSerie"></select>

<label>Equipamento</label>
<select multiple class="multi" id="filtroEquipamento"></select>

<label>Cliente</label>
<select multiple class="multi" id="filtroCliente"></select>

<br>

<button id="btnRelatorio" onclick="gerarRelatorio()" style="display:none">
Gerar Relatório
</button>

<div class="cards">
<div class="card"><h4>Faturamento</h4><div class="total" id="cardFat">0</div></div>
<div class="card"><h4>Manutenção</h4><div class="total" id="cardMan">0</div></div>
<div class="card"><h4>Resultado</h4><div class="total" id="cardRes">0</div></div>
</div>

<div class="card">
<h3>Faturamento por Equipamento</h3>
<canvas id="graficoEquipamento"></canvas>
</div>

<div class="card">
<h3>Faturamento por Cliente</h3>
<canvas id="graficoCliente"></canvas>
</div>

<script>

let dados=[];
let charts=[];

function num(v){
    if(!v) return 0;
    if(typeof v === "number") return v;
    return parseFloat(v.toString().replace(/\./g,'').replace(',','.')) || 0;
}

function carregarDados(){

    const file = upload.files[0];

    if(!file){
        alert("Selecione um arquivo");
        return;
    }

    btnCarregar.disabled = true;
    btnRelatorio.style.display = "none";
    statusCarga.innerText = "Carregando dados...";

    const reader = new FileReader();

    reader.onload = e => {

        const workbook = XLSX.read(e.target.result,{type:'binary'});
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        const json = XLSX.utils.sheet_to_json(sheet,{header:1});

        dados = [];

        for(let i=1;i<json.length;i++){

            const l = json[i];

            dados.push({
                filial:l[0],
                patrimonio:l[1],
                serie:l[2],
                equipamento:l[3],
                faturamento:num(l[7]),
                manutencao:num(l[8]),
                resultado:num(l[12]),
                cliente:l[14],
                data:new Date(l[15])
            });
        }

        preencherFiltros();

        statusCarga.innerText = "Dados carregados ✔";
        btnRelatorio.style.display = "inline-block";
        btnCarregar.disabled = false;
    };

    reader.readAsBinaryString(file);
}

function preencherFiltros(){
    preencherSelect("filtroFilial","filial");
    preencherSelect("filtroPatrimonio","patrimonio");
    preencherSelect("filtroSerie","serie");
    preencherSelect("filtroEquipamento","equipamento");
    preencherSelect("filtroCliente","cliente");
}

function preencherSelect(id,campo){

    const select = document.getElementById(id);
    select.innerHTML="";

    const valores = [...new Set(dados.map(d => d[campo]).filter(Boolean))];

    valores.sort();

    valores.forEach(v=>{
        const option = document.createElement("option");
        option.value=v;
        option.text=v;
        select.appendChild(option);
    });
}

function gerarRelatorio(){

    const dtIni = dataInicio.value ? new Date(dataInicio.value) : null;
    const dtFim = dataFim.value ? new Date(dataFim.value) : null;

    const filtrado = dados.filter(d =>
        (!dtIni || d.data >= dtIni) &&
        (!dtFim || d.data <= dtFim)
    );

    let fat=0, man=0, res=0;

    const porEquip={}
    const porCliente={}

    filtrado.forEach(d=>{

        fat+=d.faturamento
        man+=d.manutencao
        res+=d.resultado

        porEquip[d.equipamento]=(porEquip[d.equipamento]||0)+d.faturamento
        porCliente[d.cliente]=(porCliente[d.cliente]||0)+d.faturamento
    })

    cardFat.innerText = fat.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})
    cardMan.innerText = man.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})
    cardRes.innerText = res.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})

    charts.forEach(c=>c.destroy())
    charts=[]

    charts.push(new Chart(graficoEquipamento,{
        type:'bar',
        data:{
            labels:Object.keys(porEquip),
            datasets:[{data:Object.values(porEquip)}]
        }
    }))

    charts.push(new Chart(graficoCliente,{
        type:'pie',
        data:{
            labels:Object.keys(porCliente),
            datasets:[{data:Object.values(porCliente)}]
        }
    }))
}

</script>

</body>
</html>
