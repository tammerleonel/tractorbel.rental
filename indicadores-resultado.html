<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relatório Financeiro Rental</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    font-family: Arial;
    background:#f5f6fa;
    padding:20px;
}

.card{
    background:white;
    padding:20px;
    margin-bottom:20px;
    border-radius:10px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.cards{
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
    margin-bottom:20px;
}

.total{
    font-size:22px;
    font-weight:bold;
    color:green;
}

select, button, input{
    padding:8px;
    margin-right:10px;
    margin-bottom:10px;
}

canvas{
    background:white;
    padding:15px;
    border-radius:10px;
}

.multi{
    width:220px;
    height:120px;
}
</style>
</head>

<body>

<h2>Relatório Financeiro Rental</h2>

<input type="file" id="upload" accept=".xls,.xlsx">
<button onclick="carregarDados()">Carregar</button>

<br><br>

<label>Data Inicio</label>
<input type="date" id="dataInicio">

<label>Data Fim</label>
<input type="date" id="dataFim">

<br><br>

<label>Filial</label>
<select multiple class="multi" id="filtroFilial"></select>

<label>Patrimônio</label>
<select multiple class="multi" id="filtroPatrimonio"></select>

<label>Série</label>
<select multiple class="multi" id="filtroSerie"></select>

<label>Equipamento</label>
<select multiple class="multi" id="filtroEquipamento"></select>

<label>Cliente</label>
<select multiple class="multi" id="filtroCliente"></select>

<br>

<button onclick="gerarRelatorio()">Gerar Relatório</button>

<div class="cards">
<div class="card"><h4>Faturamento</h4><div class="total" id="cardFat">0</div></div>
<div class="card"><h4>Manutenção</h4><div class="total" id="cardMan">0</div></div>
<div class="card"><h4>Financiamento</h4><div class="total" id="cardFin">0</div></div>
<div class="card"><h4>Impostos</h4><div class="total" id="cardImp">0</div></div>
<div class="card"><h4>Tx Administrativa</h4><div class="total" id="cardAdm">0</div></div>
<div class="card"><h4>Resultado</h4><div class="total" id="cardRes">0</div></div>
<div class="card"><h4>Cobrança Mau Uso</h4><div class="total" id="cardMau">0</div></div>
</div>

<div class="card">
<h3>Faturamento x Tipo de equipamento</h3>
<canvas id="graficoEquipamento"></canvas>
</div>

<div class="card">
<h3>Faturamento x Cliente</h3>
<canvas id="graficoFatCliente"></canvas>
</div>

<div class="card">
<h3>Custo de Manutenção x Cliente</h3>
<canvas id="graficoManCliente"></canvas>
</div>

<div class="card">
<h3>Contratos com déficit x Cliente</h3>
<canvas id="graficoDeficit"></canvas>
</div>

<script>

let dados=[];
let charts=[];

function num(v){
    if(!v) return 0;
    if(typeof v === "number") return v;
    return parseFloat(v.toString().replace(/\./g,'').replace(',','.')) || 0;
}

function carregarDados(){

    const file = upload.files[0];
    const reader = new FileReader();

    reader.onload = e => {

        const workbook = XLSX.read(e.target.result,{type:'binary'});
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        const json = XLSX.utils.sheet_to_json(sheet,{header:1});

        dados = json.slice(1).map(l => ({
            filial:l[0],
            patrimonio:l[1],
            serie:l[2],
            equipamento:l[3],
            faturamento:num(l[7]),
            manutencao:num(l[8]),
            financiamento:num(l[9]),
            impostos:num(l[10]),
            tx:num(l[11]),
            resultado:num(l[12]),
            mau:num(l[13]),
            cliente:l[14],
            data: converterDataExcel(l[15])
        }));

        preencherFiltros();
        alert("Dados carregados");
    };

    reader.readAsBinaryString(file);
}

function converterDataExcel(valor){
    if(typeof valor === "number"){
        const utc_days = Math.floor(valor - 25569);
        const utc_value = utc_days * 86400;                                        
        const date = new Date(utc_value * 1000);
        return date;
    }
    return new Date(valor);
}

function preencherFiltros(){

    preencher("filtroFilial",dados.map(d=>d.filial));
    preencher("filtroPatrimonio",dados.map(d=>d.patrimonio));
    preencher("filtroSerie",dados.map(d=>d.serie));
    preencher("filtroEquipamento",dados.map(d=>d.equipamento));
    preencher("filtroCliente",dados.map(d=>d.cliente));
}

function preencher(id,valores){
    const select=document.getElementById(id);
    select.innerHTML="";
    [...new Set(valores)].filter(v=>v).sort()
    .forEach(v=>{
        select.innerHTML+=`<option value="${v}">${v}</option>`;
    });
}

function selecionados(select){
    return [...select.selectedOptions].map(o=>o.value);
}

function filtrar(){

    const inicio = dataInicio.value ? new Date(dataInicio.value) : null;
    const fim = dataFim.value ? new Date(dataFim.value) : null;

    return dados.filter(d=>{

        if(inicio && d.data < inicio) return false;
        if(fim && d.data > fim) return false;

        if(filtroFilial.selectedOptions.length && !selecionados(filtroFilial).includes(d.filial)) return false;
        if(filtroPatrimonio.selectedOptions.length && !selecionados(filtroPatrimonio).includes(d.patrimonio)) return false;
        if(filtroSerie.selectedOptions.length && !selecionados(filtroSerie).includes(d.serie)) return false;
        if(filtroEquipamento.selectedOptions.length && !selecionados(filtroEquipamento).includes(d.equipamento)) return false;
        if(filtroCliente.selectedOptions.length && !selecionados(filtroCliente).includes(d.cliente)) return false;

        return true;
    });
}

function gerarRelatorio(){

    charts.forEach(c=>c.destroy());
    charts=[];

    const base=filtrar();

    let fat=0,man=0,fin=0,imp=0,adm=0,res=0,mau=0;

    const equip={},fatCliente={},manCliente={},deficit={};

    base.forEach(d=>{

        fat+=d.faturamento;
        man+=d.manutencao;
        fin+=d.financiamento;
        imp+=d.impostos;
        adm+=d.tx;
        res+=d.resultado;
        mau+=d.mau;

        equip[d.equipamento]=(equip[d.equipamento]||0)+d.faturamento;
        fatCliente[d.cliente]=(fatCliente[d.cliente]||0)+d.faturamento;
        manCliente[d.cliente]=(manCliente[d.cliente]||0)+d.manutencao;

        if(d.resultado < 0){
            deficit[d.cliente]=(deficit[d.cliente]||0)+d.resultado;
        }
    });

    cardFat.innerText=fat.toLocaleString("pt-BR");
    cardMan.innerText=man.toLocaleString("pt-BR");
    cardFin.innerText=fin.toLocaleString("pt-BR");
    cardImp.innerText=imp.toLocaleString("pt-BR");
    cardAdm.innerText=adm.toLocaleString("pt-BR");
    cardRes.innerText=res.toLocaleString("pt-BR");
    cardMau.innerText=mau.toLocaleString("pt-BR");

    criarGrafico("graficoEquipamento","bar",equip);
    criarGrafico("graficoFatCliente","pie",fatCliente);
    criarGrafico("graficoManCliente","pie",manCliente);
    criarGrafico("graficoDeficit","bar",deficit);
}

function criarGrafico(id,tipo,obj){

    const total = Object.values(obj).reduce((a,b)=>a+b,0);

    const chart=new Chart(document.getElementById(id),{
        type:tipo,
        data:{
            labels:Object.keys(obj),
            datasets:[{
                data:Object.values(obj)
            }]
        },
        options:{
            responsive:true,
            plugins:{
                tooltip:{
                    callbacks:{
                        label:function(ctx){
                            const v=ctx.raw;
                            const p=((v/total)*100).toFixed(1);
                            return v.toLocaleString("pt-BR")+" ("+p+"%)";
                        }
                    }
                }
            }
        }
    });

    charts.push(chart);
}

</script>

</body>
</html>
