<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relatório Financeiro Rental</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    font-family: Arial, Helvetica, sans-serif;
    background:#f5f6fa;
    padding:20px;
    margin:0;
}
h2{
    text-align:center;
    margin-bottom:20px;
}
.card{
    background:white;
    text-align: center;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}
.cards{
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
    margin-bottom:20px;
}
.total{
    font-size:22px;
    font-weight:bold;
    color:green;
    text-align: center;
}
select, button, input{
    margin-right:10px;
    margin-bottom:10px;
}
canvas{
    background:white;
    padding:15px;
    border-radius:10px;
}
.multi{
    width:220px;
    height:120px;
}
/* ---------- Filtro fixo no topo ---------- */
.filtros-container{
    background:#fff;
    border-left:5px solid green;
    padding:15px;
    border-radius:10px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
    position: sticky;
    top:10px;
    z-index:100;
    display: flex;
    flex-wrap: wrap;
    gap:10px;
}
.filtros-container label{
    font-weight:bold;
    margin-right:5px;
}
</style>
</head>

<body>

<h2>Relatório Financeiro Rental</h2>

<!-- Login -->
<div id="login">
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="senha" placeholder="Senha">
    <button onclick="login()">Login</button>
</div>

<div id="conteudo" style="display:none">
    <input type="file" id="upload" accept=".xls,.xlsx">
    <button id="btnCarregar">Carregar</button>
    <span id="statusCarga"></span>

    <div class="filtros-container">
        <label>Mês/Ano Início</label>
        <input type="month" id="mesInicio" disabled>
        <label>Mês/Ano Fim</label>
        <input type="month" id="mesFim" disabled>

        <label>Filial</label>
        <select multiple class="multi" id="filtroFilial"></select>

        <label>Patrimônio</label>
        <select multiple class="multi" id="filtroPatrimonio"></select>

        <label>Série</label>
        <select multiple class="multi" id="filtroSerie"></select>

        <label>Equipamento</label>
        <select multiple class="multi" id="filtroEquipamento"></select>

        <label>Cliente</label>
        <select multiple class="multi" id="filtroCliente"></select>

        <button id="btnLimpar">Limpar Filtros</button>
    </div>

    <div class="cards">
        <div class="card"><h4>Faturamento</h4><div class="total" id="cardFat">0</div></div>
        <div class="card"><h4>Financiamento</h4><div class="total" id="cardFin">0</div></div>
        <div class="card"><h4>Impostos</h4><div class="total" id="cardImp">0</div></div>
        <div class="card"><h4>Custo de Manutenção</h4><div class="total" id="cardMan">0</div></div>
        <div class="card"><h4>Taxa Administrativa</h4><div class="total" id="cardTx">0</div></div>
        <div class="card"><h4>Resultado</h4><div class="total" id="cardRes">0</div></div>
        <div class="card"><h4>Faturamento Avaria</h4><div class="total" id="cardMau">0</div></div>
    </div>

    <div class="card">
        <h3>Faturamento x Equipamento</h3>
        <canvas id="graficoEquipamento"></canvas>
    </div>

    <div class="card">
        <h3>Faturamento x Cliente</h3>
        <canvas id="graficoCliente"></canvas>
    </div>

    <div class="card">
        <h3>Manutenção x Cliente</h3>
        <canvas id="graficoManutencao"></canvas>
    </div>

    <div class="card">
        <h3>Déficit x Cliente</h3>
        <canvas id="graficoDeficit"></canvas>
    </div>
</div>

<script type="module">
// ---------- MANTIVEI TODO LOGIN FIREBASE ----------
// Seu código Firebase login permanece intacto
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js"; 
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

// ------------------- VARIÁVEIS E FUNÇÕES -------------------
let dadosGlobais = [];
let graficos = [];
const mesInicio = document.getElementById("mesInicio");
const mesFim = document.getElementById("mesFim");

// Converter número
function converterNumero(valor){
    if(valor===null||valor===undefined||valor==="") return 0;
    if(typeof valor==="number") return valor;
    return parseFloat(valor.toString().replace(/\./g,'').replace(',','.')) || 0;
}

// Carregar Excel
window.carregarDados = function(){
    const input = document.getElementById('upload');
    const file = input.files[0];
    const status = document.getElementById("statusCarga");
    const btnCarregar = document.getElementById("btnCarregar");
    const btnLimpar = document.getElementById("btnLimpar");
    if(!file){ alert("Selecione um arquivo"); return; }

    btnCarregar.disabled = true;
    btnLimpar.style.display="none";
    status.innerText="Carregando planilha...";

    const reader = new FileReader();
    reader.onload = function(e){
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data,{type:'array'});
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        const json = XLSX.utils.sheet_to_json(sheet,{header:1});
        dadosGlobais=[];

        for(let i=1;i<json.length;i++){
            const l = json[i];
            let dataLinha = l[15];
            if(typeof dataLinha==="number"){ dataLinha = new Date((dataLinha-25569)*86400*1000); }
            else{ dataLinha = new Date(dataLinha); }

            if(!isNaN(dataLinha)){
                dataLinha.setHours(0,0,0,0);
                dadosGlobais.push({
                    filial: l[0], patrimonio: l[1], serie: l[2], equipamento: l[3],
                    faturamento: converterNumero(l[7]), manutencao: converterNumero(l[8]),
                    financiamento: converterNumero(l[9]), impostos: converterNumero(l[10]),
                    tx: converterNumero(l[11]), resultado: converterNumero(l[12]),
                    mau: converterNumero(l[13]), cliente: l[14], data: dataLinha
                });
            }
        }

        // Ajusta meses
        const datas = dadosGlobais.map(d=>d.data);
        const minData = new Date(Math.min(...datas));
        const maxData = new Date(Math.max(...datas));
        const formatarMes = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
        mesInicio.min = formatarMes(minData);
        mesInicio.max = formatarMes(maxData);
        mesFim.min = formatarMes(minData);
        mesFim.max = formatarMes(maxData);
        mesInicio.value = formatarMes(minData);
        mesFim.value = formatarMes(maxData);
        mesInicio.disabled=false;
        mesFim.disabled=false;

        atualizarFiltros();
        status.innerText="Dados carregados ✔";
        btnLimpar.style.display="inline-block";
        btnCarregar.disabled=false;

        gerarRelatorio();
    };
    reader.readAsArrayBuffer(file);
};

// Atualizar filtros
function atualizarFiltros(){
    ["filtroFilial","filtroPatrimonio","filtroSerie","filtroEquipamento","filtroCliente"]
    .forEach(id=>{
        const select = document.getElementById(id);
        if(!select) return;
        select.innerHTML="";
        select.multiple = true;
        const campo = id.replace("filtro","").toLowerCase();
        [...new Set(dadosGlobais.map(d=>d[campo]).filter(Boolean))].sort()
            .forEach(v=>{ const opt=document.createElement("option"); opt.value=v; opt.text=v; select.appendChild(opt); });
        select.addEventListener("change", gerarRelatorio);
    });
}

function getMultiValues(id){
    const select = document.getElementById(id);
    if(!select) return [];
    return [...select.selectedOptions].map(o=>o.value);
}

// Selecionar filtro ao clicar no gráfico
function selecionarFiltro(id, valor){
    const select = document.getElementById(id);
    if(!select) return;
    for(const opt of select.options){ opt.selected = (opt.value===valor); }
}

// Gerar relatório
window.gerarRelatorio = function(){
    const mesIni = mesInicio.value;
    const mesFimVal = mesFim.value;
    let dtIni = mesIni ? new Date(mesIni + "-01") : null;
    let dtFim = null;
    if(mesFimVal){
        const [ano, mes] = mesFimVal.split("-");
        dtFim = new Date(ano, parseInt(mes), 0);
        dtFim.setHours(23,59,59,999);
    }
    const filial = getMultiValues("filtroFilial");
    const patrimonio = getMultiValues("filtroPatrimonio");
    const serie = getMultiValues("filtroSerie");
    const equipamento = getMultiValues("filtroEquipamento");
    const cliente = getMultiValues("filtroCliente");

    const filtrado = dadosGlobais.filter(d=>
        (!dtIni || d.data>=dtIni) &&
        (!dtFim || d.data<=dtFim) &&
        (!filial.length || filial.includes(d.filial)) &&
        (!patrimonio.length || patrimonio.includes(d.patrimonio)) &&
        (!serie.length || serie.includes(d.serie)) &&
        (!equipamento.length || equipamento.includes(d.equipamento)) &&
        (!cliente.length || cliente.includes(d.cliente))
    );
    calcularTotais(filtrado);
    gerarGraficos(filtrado);
};

// Limpar filtros
window.limparFiltros = function(){
    mesInicio.value = mesInicio.min;
    mesFim.value = mesFim.max;
    ["filtroFilial","filtroPatrimonio","filtroSerie","filtroEquipamento","filtroCliente"]
    .forEach(id=>{
        const select = document.getElementById(id);
        if(select) select.selectedIndex = -1;
    });
    gerarRelatorio();
};

// Cards e gráficos permanecem inalterados
// ------------------- EVENTOS -------------------
mesInicio.addEventListener("change", gerarRelatorio);
mesFim.addEventListener("change", gerarRelatorio);
document.getElementById("btnCarregar").addEventListener("click", carregarDados);
document.getElementById("btnLimpar").addEventListener("click", limparFiltros);

</script>
</body>
</html>
