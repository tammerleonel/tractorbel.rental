<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relatório Financeiro Rental</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* filtros */
.filtros-container{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap:12px;
}

.filtros-container > div{
    display:flex;
    flex-direction:column;
    height:170px;
    border:1px solid #e0e0e0;
    border-radius:8px;
    padding:6px;
    background:#fff;
}

.filtros-container label{
    font-size:13px;
    font-weight:600;
    margin-bottom:4px;
}

/* cards */
.cards{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap:10px;
    position:sticky;
    top:0;
    z-index:999;
    background:#fff;
    padding-bottom:6px;
}

.card{
    background:#fff;
    border-radius:10px;
    padding:12px;
    box-shadow:0 2px 6px rgba(0,0,0,0.08);
    border-left:6px solid #2e7d32;
}

.card h4{margin:0;font-size:13px;color:#555;}
.card .total{font-size:18px;font-weight:bold;color:#2e7d32;margin-top:4px;}

.btn-google{
    padding:10px 20px;
    border:2px solid #34A853;
    border-radius:24px;
    background:#fff;
    color:#34A853;
    cursor:pointer;
}

.btn-google:hover{
    background:#34A853;
    color:#fff;
}

canvas{max-height:260px;}

</style>
</head>

<body>

<h2>Relatório Financeiro Rental</h2>

<!-- LOGIN -->
<div id="login">
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="senha" placeholder="Senha">
    <button class="btn-google" onclick="login()">Login</button>
</div>

<div id="conteudo" style="display:none">

<!-- upload -->
<div>
    <input type="file" id="upload" accept=".xls,.xlsx">
</div>

<!-- filtros -->
<div class="filtros-container" style="display:none">
    <div><label>Filial</label><select multiple id="filtroFilial"></select></div>
    <div><label>Patrimônio</label><select multiple id="filtroPatrimonio"></select></div>
    <div><label>Cliente</label><select multiple id="filtroCliente"></select></div>
    <div><label>Equipamento</label><select multiple id="filtroEquipamento"></select></div>
</div>

<button id="btnLimpar" class="btn-google" style="display:none">Limpar Filtros</button>

<!-- CARDS -->
<div class="cards">
    <div class="card"><h4>Faturamento</h4><div class="total" id="cardFat">0</div></div>
    <div class="card"><h4>Manutenção</h4><div class="total" id="cardMan">0</div></div>
    <div class="card"><h4>Resultado</h4><div class="total" id="cardRes">0</div></div>
</div>

<!-- GRÁFICOS -->
<div class="card"><h3>Equipamento</h3><canvas id="graficoEquipamento"></canvas></div>
<div class="card"><h3>Cliente</h3><canvas id="graficoCliente"></canvas></div>

</div>

<script type="module">

let dadosGlobais = [];
let graficos = [];

// LOGIN SIMPLES (sem firebase para evitar erro estrutural)
window.login = function(){
    document.getElementById("login").style.display="none";
    document.getElementById("conteudo").style.display="block";
};

// CONVERSÃO
function num(v){
    if(!v) return 0;
    return parseFloat(v.toString().replace(/\./g,'').replace(',','.')) || 0;
}

// UPLOAD
document.getElementById("upload").addEventListener("change", e=>{
    const file = e.target.files[0];
    const reader = new FileReader();

    reader.onload = function(ev){
        const data = new Uint8Array(ev.target.result);
        const wb = XLSX.read(data,{type:'array'});
        const sh = wb.Sheets[wb.SheetNames[0]];
        const json = XLSX.utils.sheet_to_json(sh,{header:1});

        dadosGlobais = [];

        for(let i=1;i<json.length;i++){
            let l=json[i];
            if(!l) continue;

            dadosGlobais.push({
                filial:l[0],
                patrimonio:l[1],
                cliente:l[2],
                equipamento:l[3],
                faturamento:num(l[4]),
                manutencao:num(l[5]),
                resultado:num(l[6])
            });
        }

        preencherFiltros();
        aplicar();
        document.querySelector(".filtros-container").style.display="grid";
        document.getElementById("btnLimpar").style.display="block";
    };

    reader.readAsArrayBuffer(file);
});

// PREENCHER FILTROS
function preencherFiltros(){
    fill("filtroFilial","filial");
    fill("filtroPatrimonio","patrimonio");
    fill("filtroCliente","cliente");
    fill("filtroEquipamento","equipamento");
}

function fill(id,key){
    const el=document.getElementById(id);
    el.innerHTML="";
    [...new Set(dadosGlobais.map(d=>d[key]))].forEach(v=>{
        const opt=document.createElement("option");
        opt.value=v;
        opt.textContent=v;
        el.appendChild(opt);
    });
}

// PEGAR MULTI
function get(id){
    return [...document.getElementById(id).selectedOptions].map(o=>o.value);
}

// FILTRAR
function filtrar(){
    return dadosGlobais.filter(d=>{
        const f=get("filtroFilial");
        const p=get("filtroPatrimonio");
        const c=get("filtroCliente");
        const e=get("filtroEquipamento");

        return (f.length?f.includes(d.filial):true) &&
               (p.length?p.includes(d.patrimonio):true) &&
               (c.length?c.includes(d.cliente):true) &&
               (e.length?e.includes(d.equipamento):true);
    });
}

// APLICAR
function aplicar(){
    const dados=filtrar();

    let fat=0,man=0,res=0;

    dados.forEach(d=>{
        fat+=d.faturamento;
        man+=d.manutencao;
        res+=d.resultado;
    });

    document.getElementById("cardFat").innerText=fat.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
    document.getElementById("cardMan").innerText=man.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
    document.getElementById("cardRes").innerText=res.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});

    gerarGraficos(dados);
}

// GRÁFICOS
function gerarGraficos(dados){
    graficos.forEach(g=>g.destroy());
    graficos=[];

    const fatEq={}, fatCli={};

    dados.forEach(d=>{
        fatEq[d.equipamento]=(fatEq[d.equipamento]||0)+d.faturamento;
        fatCli[d.cliente]=(fatCli[d.cliente]||0)+d.faturamento;
    });

    graficos.push(new Chart(document.getElementById("graficoEquipamento"),{
        type:'bar',
        data:{labels:Object.keys(fatEq),datasets:[{data:Object.values(fatEq)}]}
    }));

    graficos.push(new Chart(document.getElementById("graficoCliente"),{
        type:'bar',
        data:{labels:Object.keys(fatCli),datasets:[{data:Object.values(fatCli)}]}
    }));
}

// EVENTOS FILTRO
document.addEventListener("change",e=>{
    if(e.target.tagName==="SELECT") aplicar();
});

// LIMPAR
document.getElementById("btnLimpar").onclick=function(){
    document.querySelectorAll("select").forEach(s=>s.selectedIndex=-1);
    aplicar();
};

</script>
</body>
</html>
