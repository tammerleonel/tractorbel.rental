<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Totais SS</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    font-family: Arial;
    background:#f5f6fa;
    padding:20px;
}

.card{
    background:white;
    padding:20px;
    margin-bottom:20px;
    border-radius:10px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.total{
    font-size:28px;
    font-weight:bold;
    color:green;
}

table{
    width:100%;
    border-collapse:collapse;
}

th, td{
    padding:10px;
    border-bottom:1px solid #ddd;
}

th{
    background:green;
    color:white;
}
</style>

</head>

<body>

<h2>Análise de Atendimento SS</h2>

<input type="file" id="upload" accept=".xls,.xlsx">

<div class="card">
<h3>Total de atendimento</h3>
<div class="total" id="totalAtendimento">0</div>
</div>

<div class="card">
<h3>Período analisado</h3>
<p><b>Data inicial:</b> <span id="dataMin">-</span></p>
<p><b>Data final:</b> <span id="dataMax">-</span></p>
</div>

<div class="card">
<h3>Total de atendimento por Técnico</h3>
<canvas id="graficoTecnico"></canvas>
</div>

<div class="card">
<h3>Total de atendimento por modelo</h3>

<table>
<thead>
<tr>
<th>Tipo da SS</th>
<th>Quantidade</th>
</tr>
</thead>
<tbody id="tabelaModelos"></tbody>
</table>

</div>

<script>

document.getElementById('upload').addEventListener('change', function(e){

    const file = e.target.files[0];
    const reader = new FileReader();

    reader.onload = function(event){

        const data = new Uint8Array(event.target.result);
        const workbook = XLSX.read(data, {type:'array'});
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        const json = XLSX.utils.sheet_to_json(sheet);

        calcularTotais(json);
    };

    reader.readAsArrayBuffer(file);
});

let grafico;

function calcularTotais(dados){

    // Total geral
    const total = dados.length;
    document.getElementById("totalAtendimento").innerText = total;

    // Total por tipo
    const totaisTipo = {};
    const totaisTecnico = {};

    let datas = [];

    dados.forEach(linha => {

        // Tipo
        const tipo = linha["TIPO DA SS"];
        if(!totaisTipo[tipo]){
            totaisTipo[tipo] = 0;
        }
        totaisTipo[tipo]++;

        // Técnico
        const tecnico = linha["TÉCNICO DESIGNADO"] || "Não informado";
        if(!totaisTecnico[tecnico]){
            totaisTecnico[tecnico] = 0;
        }
        totaisTecnico[tecnico]++;

        // Datas
        const dataFim = linha["FIM DO ATENDIMENTO"];
        if(dataFim){
            datas.push(new Date(dataFim));
        }

    });

    // Tabela tipos
    const tbody = document.getElementById("tabelaModelos");
    tbody.innerHTML = "";

    for(const tipo in totaisTipo){
        tbody.innerHTML += `
        <tr>
            <td>${tipo}</td>
            <td>${totaisTipo[tipo]}</td>
        </tr>
        `;
    }

    // Datas min e max
    if(datas.length > 0){
        const min = new Date(Math.min(...datas));
        const max = new Date(Math.max(...datas));

        document.getElementById("dataMin").innerText = min.toLocaleDateString();
        document.getElementById("dataMax").innerText = max.toLocaleDateString();
    }

    // Gráfico técnico
    const labels = Object.keys(totaisTecnico);
    const valores = Object.values(totaisTecnico);

    if(grafico){
        grafico.destroy();
    }

    const ctx = document.getElementById('graficoTecnico');

    grafico = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: 'Atendimentos por Técnico',
                data: valores
            }]
        }
    });

}

</script>

</body>
</html>
