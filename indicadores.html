<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Totais SS</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{
    font-family: Arial;
    background:#f5f6fa;
    padding:20px;
}

.card{
    background:white;
    padding:20px;
    margin-bottom:20px;
    border-radius:10px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.total{
    font-size:28px;
    font-weight:bold;
    color:green;
}

table{
    width:100%;
    border-collapse:collapse;
}

th, td{
    padding:10px;
    border-bottom:1px solid #ddd;
}

th{
    background:green;
    color:white;
}
</style>

</head>

<body>

<h2>Análise de Atendimento SS</h2>

<input type="file" id="upload" accept=".xls,.xlsx">

<div class="card">
<h3>Total de atendimento</h3>
<div class="total" id="totalAtendimento">0</div>
</div>

<div class="card">
<h3>Total de atendimento por modelo</h3>

<table>
<thead>
<tr>
<th>Tipo da SS</th>
<th>Quantidade</th>
</tr>
</thead>
<tbody id="tabelaModelos"></tbody>
</table>

</div>

<script>

document.getElementById('upload').addEventListener('change', function(e){

    const file = e.target.files[0];
    const reader = new FileReader();

    reader.onload = function(event){

        const data = new Uint8Array(event.target.result);
        const workbook = XLSX.read(data, {type:'array'});
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        const json = XLSX.utils.sheet_to_json(sheet);

        calcularTotais(json);
    };

    reader.readAsArrayBuffer(file);
});

function calcularTotais(dados){

    // Total geral
    const total = dados.length;
    document.getElementById("totalAtendimento").innerText = total;

    // Total por tipo
    const totaisTipo = {};

    dados.forEach(linha => {

        const tipo = linha["TIPO DA SS"];

        if(!totaisTipo[tipo]){
            totaisTipo[tipo] = 0;
        }

        totaisTipo[tipo]++;
    });

    const tbody = document.getElementById("tabelaModelos");
    tbody.innerHTML = "";

    for(const tipo in totaisTipo){
        tbody.innerHTML += `
        <tr>
            <td>${tipo}</td>
            <td>${totaisTipo[tipo]}</td>
        </tr>
        `;
    }
}

</script>

</body>
</html>
