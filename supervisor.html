<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Cálculo Combustível por Pessoa</title>

<style>
body{
    font-family: Arial;
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.container{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
    width:320px;
}
input, button{
    width:100%;
    padding:8px;
    margin-top:10px;
}
button{
    background:#007BFF;
    color:white;
    border:none;
    cursor:pointer;
}
.resultado{
    margin-top:15px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">
<h3>Cálculo Combustível por Pessoa</h3>

<label>Distância (KM)</label>
<input type="number" id="distancia" placeholder="Ex: 120">

<label>Média (KM por litro)</label>
<input type="number" id="media" placeholder="Ex: 12">

<label>Preço do combustível (R$)</label>
<input type="number" id="preco" placeholder="Ex: 5.79" step="0.01">

<label>Pessoas no veículo</label>
<input type="number" id="pessoas" placeholder="Ex: 4">

<button onclick="calcular()">Calcular</button>

<div class="resultado" id="resultado"></div>
</div>

<script>
function calcular(){
    var distancia = parseFloat(document.getElementById("distancia").value);
    var media = parseFloat(document.getElementById("media").value);
    var preco = parseFloat(document.getElementById("preco").value);
    var pessoas = parseInt(document.getElementById("pessoas").value);

    if(!distancia || !media || !preco || !pessoas){
        document.getElementById("resultado").innerHTML = "Preencha todos os campos";
        return;
    }

    var litros = distancia / media;
    var total = litros * preco;
    var porPessoa = total / pessoas;

    document.getElementById("resultado").innerHTML =
        "Litros necessários: " + litros.toFixed(2) + " L<br>" +
        "Valor total: R$ " + total.toFixed(2) + "<br>" +
        "Valor por pessoa: R$ " + porPessoa.toFixed(2);
}
</script>

</body>
</html>
